<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | FreshBite</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-page">
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">F</span>
      <span><strong>FreshBite</strong><small>Admin</small></span>
    </a>
    <a class="back-link" href="/">View restaurant</a>
  </header>

  <main class="admin-main">
    <section class="admin-login" id="loginPanel">
      <p class="eyebrow">Restricted area</p>
      <h1>Admin sign in</h1>
      <p>Sign in to view customer orders and item quantities.</p>
      <form id="loginForm" class="admin-login-form">
        <label>Username<input name="username" autocomplete="username" required></label>
        <label>Password<input name="password" type="password" autocomplete="current-password" required></label>
        <button class="submit-button" type="submit">Sign in</button>
        <p class="form-message" id="loginMessage" role="status"></p>
      </form>
    </section>

    <section class="admin-dashboard" id="dashboard" hidden>
      <div class="admin-heading">
        <div><p class="eyebrow">Live kitchen</p><h1>Customer orders</h1></div>
        <div class="admin-actions">
          <button class="back-link" id="refreshOrders" type="button">Refresh</button>
          <button class="text-button" id="logoutButton" type="button">Sign out</button>
        </div>
      </div>
      <div class="admin-summary" id="adminSummary"></div>
      <div class="orders-list" id="ordersList"></div>

      <section class="product-manager">
        <div class="admin-heading product-heading">
          <div><p class="eyebrow">Promo control</p><h2>Generate promo codes</h2></div>
        </div>
        <div class="product-manager-layout">
          <form class="product-form" id="couponForm">
            <div class="form-row">
              <label>Code prefix<input name="prefix" placeholder="FRESH"></label>
              <label>Code<input name="code" placeholder="Leave blank to generate"></label>
            </div>
            <label>Description<input name="description" placeholder="10% off weekend orders"></label>
            <div class="form-row">
              <label>Discount type
                <select name="type" required>
                  <option value="percent">Percent off</option>
                  <option value="fixed">Fixed amount off</option>
                  <option value="free_delivery">Free delivery</option>
                </select>
              </label>
              <label>Value<input name="value" type="number" min="0" step="1" placeholder="10" required></label>
            </div>
            <div class="form-row">
              <label>Minimum subtotal<input name="minSubtotal" type="number" min="0" step="1" value="0" required></label>
              <label>Max discount<input name="maxDiscount" type="number" min="1" step="1" placeholder="100"></label>
            </div>
            <button class="submit-button" type="submit" id="saveCoupon">Generate promo code</button>
            <p class="form-message" id="couponAdminMessage" role="status"></p>
          </form>
          <div class="admin-products" id="adminCoupons"></div>
        </div>
      </section>

      <section class="product-manager">
        <div class="admin-heading product-heading">
          <div><p class="eyebrow">Menu control</p><h2>Add or edit products</h2></div>
        </div>
        <div class="product-manager-layout">
          <form class="product-form" id="productForm">
            <input type="hidden" name="id">
            <label>Product name<input name="name" placeholder="Classic Veg Burger" required></label>
            <div class="form-row">
              <label>Category<input name="category" placeholder="Burgers" required></label>
              <label>Price (Rs)<input name="price" type="number" min="1" step="1" placeholder="199" required></label>
            </div>
            <div class="form-row">
              <label>Rating<input name="rating" type="number" min="0" max="5" step="0.1" placeholder="4.5" required></label>
              <label>Preparation time<input name="prepTime" placeholder="20 min" required></label>
            </div>
            <label>Image URL<input name="image" type="url" placeholder="https://example.com/food.jpg" required></label>
            <label>Description<textarea name="description" rows="3" placeholder="Describe the dish" minlength="8" required></textarea></label>
            <div class="product-form-actions">
              <button class="submit-button" type="submit" id="saveProduct">Add product</button>
              <button class="back-link" type="button" id="cancelEdit" hidden>Cancel edit</button>
            </div>
            <p class="form-message" id="productMessage" role="status"></p>
          </form>
          <div class="admin-products" id="adminProducts"></div>
        </div>
      </section>
    </section>
  </main>
  <script src="/admin.js"></script>
</body>
</html>
